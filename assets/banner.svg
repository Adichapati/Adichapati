<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 240" width="640" height="240">
  <defs>
    <style>
      @font-face {
        font-family: 'VT323';
        src: url(data:font/woff2;base64,) format('woff2');
      }
      .vt   { font-family: 'VT323', Menlo, Consolas, 'DejaVu Sans Mono', monospace; }
      .art  { font-family: Menlo, Consolas, 'DejaVu Sans Mono', monospace; font-size: 15px; fill: #00ff41; }
    </style>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.4" result="b">
        <animate attributeName="stdDeviation" values="1.2;2;1.2" dur="4s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan" width="4" height="3" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#000" opacity="0.14"/>
    </pattern>
    <linearGradient id="sweep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00ff41" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00ff41" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#00ff41" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="window"><rect x="4" y="4" width="632" height="232" rx="8"/></clipPath>
  </defs>

  <rect x="4" y="4" width="632" height="232" rx="8" fill="#0d1117" stroke="#30363d"/>
  <path d="M4 12a8 8 0 0 1 8-8h616a8 8 0 0 1 8 8v26H4z" fill="#161b22"/>
  <line x1="4" y1="38" x2="636" y2="38" stroke="#21262d"/>
  <circle cx="24" cy="21" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="21" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="21" r="6" fill="#27c93f"/>
  <text x="320" y="27" text-anchor="middle" class="vt" font-size="16" fill="#8b949e">sprake@github: ~</text>

  <g>
    <animate attributeName="opacity" calcMode="discrete" values="0;1;0.3;1" dur="0.3s" begin="0s" fill="freeze"/>

    <text x="28" y="65" class="vt" font-size="17" xml:space="preserve"><tspan fill="#39d353">$ </tspan><tspan fill="#c9d1d9"><tspan>f<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="0.8s" begin="0s" fill="freeze"/></tspan><tspan>i<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="0.92s" begin="0s" fill="freeze"/></tspan><tspan>g<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="1.04s" begin="0s" fill="freeze"/></tspan><tspan>l<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="1.16s" begin="0s" fill="freeze"/></tspan><tspan>e<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="1.28s" begin="0s" fill="freeze"/></tspan><tspan>t<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="1.4s" begin="0s" fill="freeze"/></tspan><tspan> <animate attributeName="opacity" calcMode="discrete" values="0;1" dur="1.52s" begin="0s" fill="freeze"/></tspan><tspan>s<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="1.64s" begin="0s" fill="freeze"/></tspan><tspan>p<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="1.76s" begin="0s" fill="freeze"/></tspan><tspan>r<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="1.88s" begin="0s" fill="freeze"/></tspan><tspan>a<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="2s" begin="0s" fill="freeze"/></tspan><tspan>k<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="2.12s" begin="0s" fill="freeze"/></tspan><tspan>e<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="2.24s" begin="0s" fill="freeze"/></tspan></tspan></text>

    <g filter="url(#glow)">
    <text x="28" y="96" xml:space="preserve" class="art">███████╗ ██████╗  ██████╗   █████╗  ██╗  ██╗ ███████╗<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="2.9s" begin="0s" fill="freeze"/></text>
    <text x="28" y="111" xml:space="preserve" class="art">██╔════╝ ██╔══██╗ ██╔══██╗ ██╔══██╗ ██║ ██╔╝ ██╔════╝<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="3.2s" begin="0s" fill="freeze"/></text>
    <text x="28" y="126" xml:space="preserve" class="art">███████╗ ██████╔╝ ██████╔╝ ███████║ █████╔╝  █████╗<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="3.5s" begin="0s" fill="freeze"/></text>
    <text x="28" y="141" xml:space="preserve" class="art">╚════██║ ██╔═══╝  ██╔══██╗ ██╔══██║ ██╔═██╗  ██╔══╝<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="3.8s" begin="0s" fill="freeze"/></text>
    <text x="28" y="156" xml:space="preserve" class="art">███████║ ██║      ██║  ██║ ██║  ██║ ██║  ██╗ ███████╗<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="4.1s" begin="0s" fill="freeze"/></text>
    <text x="28" y="171" xml:space="preserve" class="art">╚══════╝ ╚═╝      ╚═╝  ╚═╝ ╚═╝  ╚═╝ ╚═╝  ╚═╝ ╚══════╝<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="4.4s" begin="0s" fill="freeze"/></text>
    </g>

    <g>
      <animate attributeName="opacity" calcMode="discrete" values="0;1" dur="5.2s" begin="0s" fill="freeze"/>
      <text x="28" y="216" class="vt" font-size="17" fill="#39d353">$</text>
      <rect x="43" y="203" width="8" height="15" fill="#00ff41">
        <animate attributeName="opacity" calcMode="discrete" values="1;0" dur="1.1s" begin="2.6s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <g clip-path="url(#window)">
    <rect x="4" width="632" height="60" fill="url(#sweep)">
      <animate attributeName="y" values="-60;240" dur="7s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <rect x="4" y="4" width="632" height="232" fill="url(#scan)"/>
  </g>
</svg>
