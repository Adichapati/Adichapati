<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" width="640" height="280">
  <defs>
    <style>
      @font-face {
        font-family: 'VT323';
        src: url(data:font/woff2;base64,) format('woff2');
      }
      .vt   { font-family: 'VT323', Menlo, Consolas, 'DejaVu Sans Mono', monospace; }
      .art  { font-family: Menlo, Consolas, 'DejaVu Sans Mono', monospace; font-size: 15px; fill: #00ff41; }
    </style>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.4" result="b">
        <animate attributeName="stdDeviation" values="1.2;2;1.2" dur="4s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan" width="4" height="3" patternUnits="userSpaceOnUse">
      <rect width="4" height="1" fill="#000" opacity="0.14"/>
    </pattern>
    <linearGradient id="sweep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00ff41" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#00ff41" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#00ff41" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="window"><rect x="4" y="4" width="632" height="272" rx="8"/></clipPath>
  </defs>

  <rect x="4" y="4" width="632" height="272" rx="8" fill="#0d1117" stroke="#30363d"/>
  <path d="M4 12a8 8 0 0 1 8-8h616a8 8 0 0 1 8 8v26H4z" fill="#161b22"/>
  <line x1="4" y1="38" x2="636" y2="38" stroke="#21262d"/>
  <circle cx="24" cy="21" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="21" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="21" r="6" fill="#27c93f"/>
  <text x="320" y="27" text-anchor="middle" class="vt" font-size="16" fill="#8b949e">sprake@github: ~</text>

  <g>
    <animate attributeName="opacity" calcMode="discrete" values="0;1;0.3;1" dur="0.3s" begin="0s" fill="freeze"/>

    <text x="28" y="65" class="vt" font-size="17" xml:space="preserve"><tspan fill="#39d353">$ </tspan><tspan fill="#c9d1d9"><tspan>n<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="0.8s" begin="0s" fill="freeze"/></tspan><tspan>e<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="0.92s" begin="0s" fill="freeze"/></tspan><tspan>o<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="1.04s" begin="0s" fill="freeze"/></tspan><tspan>f<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="1.16s" begin="0s" fill="freeze"/></tspan><tspan>e<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="1.28s" begin="0s" fill="freeze"/></tspan><tspan>t<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="1.4s" begin="0s" fill="freeze"/></tspan><tspan>c<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="1.52s" begin="0s" fill="freeze"/></tspan><tspan>h<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="1.64s" begin="0s" fill="freeze"/></tspan></tspan></text>

    <g filter="url(#glow)">
    <text x="36" y="124" xml:space="preserve" class="art">      /\<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="2.2s" begin="0s" fill="freeze"/></text>
    <text x="36" y="140" xml:space="preserve" class="art">     /  \<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="2.44s" begin="0s" fill="freeze"/></text>
    <text x="36" y="156" xml:space="preserve" class="art">    /\   \<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="2.68s" begin="0s" fill="freeze"/></text>
    <text x="36" y="172" xml:space="preserve" class="art">   /      \<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="2.92s" begin="0s" fill="freeze"/></text>
    <text x="36" y="188" xml:space="preserve" class="art">  /   ,,   \<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="3.16s" begin="0s" fill="freeze"/></text>
    <text x="36" y="204" xml:space="preserve" class="art"> /   |  |  -\<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="3.4s" begin="0s" fill="freeze"/></text>
    <text x="36" y="220" xml:space="preserve" class="art">/_-''    ''-_\<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="3.64s" begin="0s" fill="freeze"/></text>
    </g>

    <text x="210" y="100" class="vt" font-size="18" fill="#00ff41">sprake@github<animate attributeName="opacity" calcMode="discrete" values="0;1" dur="2.2s" begin="0s" fill="freeze"/></text>
    <line x1="210" y1="108" x2="330" y2="108" stroke="#39d353" stroke-width="1"><animate attributeName="opacity" calcMode="discrete" values="0;1" dur="2.3s" begin="0s" fill="freeze"/></line>

    <text y="130" class="vt" font-size="16"><tspan x="210" fill="#39d353">user</tspan><tspan x="290" fill="#c9d1d9">adithya raj</tspan><animate attributeName="opacity" calcMode="discrete" values="0;1" dur="2.4s" begin="0s" fill="freeze"/></text>
    <text y="147" class="vt" font-size="16"><tspan x="210" fill="#39d353">os</tspan><tspan x="290" fill="#c9d1d9">arch linux, btw</tspan><animate attributeName="opacity" calcMode="discrete" values="0;1" dur="2.66s" begin="0s" fill="freeze"/></text>
    <text y="164" class="vt" font-size="16"><tspan x="210" fill="#39d353">role</tspan><tspan x="290" fill="#c9d1d9">cse undergrad</tspan><animate attributeName="opacity" calcMode="discrete" values="0;1" dur="2.92s" begin="0s" fill="freeze"/></text>
    <text y="181" class="vt" font-size="16"><tspan x="210" fill="#39d353">focus</tspan><tspan x="290" fill="#c9d1d9">ai/ml × full-stack — model to interface</tspan><animate attributeName="opacity" calcMode="discrete" values="0;1" dur="3.18s" begin="0s" fill="freeze"/></text>
    <text y="198" class="vt" font-size="16"><tspan x="210" fill="#39d353">now</tspan><tspan x="290" fill="#c9d1d9">llms · agent workflows · aws cert</tspan><animate attributeName="opacity" calcMode="discrete" values="0;1" dur="3.44s" begin="0s" fill="freeze"/></text>
    <text y="215" class="vt" font-size="16"><tspan x="210" fill="#39d353">hw</tspan><tspan x="290" fill="#c9d1d9">esp32-s3 side projects</tspan><animate attributeName="opacity" calcMode="discrete" values="0;1" dur="3.7s" begin="0s" fill="freeze"/></text>
    <text y="232" class="vt" font-size="16"><tspan x="210" fill="#39d353">uptime</tspan><tspan x="290" fill="#c9d1d9">always shipping</tspan><animate attributeName="opacity" calcMode="discrete" values="0;1" dur="3.96s" begin="0s" fill="freeze"/></text>

    <rect x="210" y="246" width="14" height="14" fill="#0e4429"><animate attributeName="opacity" calcMode="discrete" values="0;1" dur="4.6s" begin="0s" fill="freeze"/></rect>
    <rect x="226" y="246" width="14" height="14" fill="#006d32"><animate attributeName="opacity" calcMode="discrete" values="0;1" dur="4.72s" begin="0s" fill="freeze"/></rect>
    <rect x="242" y="246" width="14" height="14" fill="#26a641"><animate attributeName="opacity" calcMode="discrete" values="0;1" dur="4.84s" begin="0s" fill="freeze"/></rect>
    <rect x="258" y="246" width="14" height="14" fill="#39d353"><animate attributeName="opacity" calcMode="discrete" values="0;1" dur="4.96s" begin="0s" fill="freeze"/></rect>
    <rect x="274" y="246" width="14" height="14" fill="#00ff41"><animate attributeName="opacity" calcMode="discrete" values="0;1" dur="5.08s" begin="0s" fill="freeze"/></rect>
    <rect x="290" y="246" width="14" height="14" fill="#30363d"><animate attributeName="opacity" calcMode="discrete" values="0;1" dur="5.2s" begin="0s" fill="freeze"/></rect>
    <rect x="306" y="246" width="14" height="14" fill="#8b949e"><animate attributeName="opacity" calcMode="discrete" values="0;1" dur="5.32s" begin="0s" fill="freeze"/></rect>
    <rect x="322" y="246" width="14" height="14" fill="#c9d1d9"><animate attributeName="opacity" calcMode="discrete" values="0;1" dur="5.44s" begin="0s" fill="freeze"/></rect>
  </g>

  <g clip-path="url(#window)">
    <rect x="4" width="632" height="60" fill="url(#sweep)">
      <animate attributeName="y" values="-60;280" dur="7s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <rect x="4" y="4" width="632" height="272" fill="url(#scan)"/>
  </g>
</svg>
